<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<title>Painterly illustration of a misty fairway at dawn</title>
<defs>
<linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C9CEDB"/><stop offset="45%" stop-color="#D9D2C8"/><stop offset="100%" stop-color="#E8DCC4"/></linearGradient>
<radialGradient id="fsun" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFF3D8" stop-opacity="0.9"/><stop offset="100%" stop-color="#FFF3D8" stop-opacity="0"/></radialGradient>
<linearGradient id="fridgeFar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A8B49C"/><stop offset="100%" stop-color="#8C9C7E"/></linearGradient>
